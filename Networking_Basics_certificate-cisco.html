<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mahesh Nadun · Certificate</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="allCertificate.css">
</head>
<body data-aos="fade-up">

    <header class="header" id="header">
        <div class="nav-container">
            <a href="#home" class="logo">
                <span class="logo-dot"></span>
                <span id="scramble-text" class="scramble-text">(>_<) MAHESH_NADUN</span>
            </a>
        </div>
    </header>

    <section class="certificate-page">
        <div class="certificate-container">
            
            <a href="index.html" class="back-link"><i class="fas fa-chevron-left"></i> back to certifications</a>

            <div class="cert-card-single">
                <span class="cert-badge-large"><i class="fas fa-certificate" style="margin-right: 8px;"></i> Cisco Networking Academy</span>
                <h2> Networking Basics </h2>
                
                <div class="cert-issuer">
                    <i class="fas fa-building"></i> Issued by Cisco · 2026
                </div>

                <div class="cert-description">
                    <img src="Networking_Basics_certificate-cisco.jpg" alt="Certified Ethical Hacker Certificate" class="cert-image">
                </div>

                <div class="cert-meta-grid">
                    <div class="meta-item">
                        <span class="meta-label"><i class="fas fa-clock"></i> Valid until</span>
                        <span class="meta-value"><i class="fas fa-shield-alt"></i>   <span class="verify-badge">ACTIVE</span></span>
                </div>

                    <a href="https://www.credly.com/earner/dashboard" class="btn btn-outline" target="_blank">
                        <i class="fas fa-external-link-alt"></i> Verify online
                    </a>
                </div>
            </div>
        </div>
    </section>
            <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    AOS.init({
        duration: 1000,
        once: true
    });
</script>
